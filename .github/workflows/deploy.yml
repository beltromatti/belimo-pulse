name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_repository: ${{ steps.image.outputs.image_repository }}
      ghcr_username: ${{ steps.image.outputs.ghcr_username }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: image
        run: |
          echo "image_repository=ghcr.io/${{ github.repository_owner }}/belimo-pulse-backend" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${{ github.repository_owner }}/belimo-pulse-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "ghcr_username=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_repository }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=belimo-pulse-backend
            org.opencontainers.image.description=Belimo Pulse backend container
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image.outputs.image_repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.image_repository }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_image
    permissions:
      contents: read
    steps:
      - name: Prepare SSH
        env:
          AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s' "$AWS_EC2_SSH_KEY" > "$HOME/.ssh/belimo"
          chmod 600 "$HOME/.ssh/belimo"
          ssh-keyscan -H "$AWS_EC2_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy backend on EC2
        env:
          AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
          BACKEND_ENV_FILE_B64: ${{ secrets.BACKEND_ENV_FILE_B64 }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ needs.build_image.outputs.ghcr_username }}
          IMAGE_REF: ${{ needs.build_image.outputs.image_ref }}
          IMAGE_REPOSITORY: ${{ needs.build_image.outputs.image_repository }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/belimo" "${AWS_EC2_USER}@${AWS_EC2_HOST}" \
            "BACKEND_ENV_FILE_B64='${BACKEND_ENV_FILE_B64}' GHCR_PULL_TOKEN='${GHCR_PULL_TOKEN}' GHCR_USERNAME='${GHCR_USERNAME}' IMAGE_REF='${IMAGE_REF}' IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' bash -s" <<'EOF'
          set -euo pipefail
          sudo install -d -m 755 /opt/belimo-pulse/backend
          sudo install -d -m 755 /opt/belimo-pulse/postgres
          sudo install -d -m 700 -o 999 -g 999 /opt/belimo-pulse/postgres/data
          sudo install -d -m 755 /opt/belimo-pulse/caddy/conf
          sudo install -d -m 755 /opt/belimo-pulse/caddy/data
          sudo install -d -m 755 /opt/belimo-pulse/caddy/config
          public_ip="$(curl -fsS http://169.254.169.254/latest/meta-data/public-ipv4)"
          public_host="${public_ip}.sslip.io"

          sudo tee /opt/belimo-pulse/caddy/conf/Caddyfile >/dev/null <<CADDYFILE
          ${public_host} {
            reverse_proxy belimo-pulse-backend:8080
          }
          CADDYFILE

          printf '%s' "$BACKEND_ENV_FILE_B64" | base64 -d | sudo tee /opt/belimo-pulse/backend/.env.base >/dev/null
          sudo test -s /opt/belimo-pulse/backend/database.env
          sudo test -s /opt/belimo-pulse/postgres/postgres.env
          sudo chmod 600 /opt/belimo-pulse/backend/.env.base /opt/belimo-pulse/backend/database.env /opt/belimo-pulse/postgres/postgres.env
          sudo sh -c "grep -v -E '^(DATABASE_URL|DATABASE_SSL)=' /opt/belimo-pulse/backend/.env.base > /opt/belimo-pulse/backend/.env.runtime"
          sudo sh -c "cat /opt/belimo-pulse/backend/database.env >> /opt/belimo-pulse/backend/.env.runtime"
          echo "$GHCR_PULL_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          sudo docker pull "$IMAGE_REF"
          sudo docker pull postgres:17.9
          sudo docker pull caddy:2
          sudo docker network create belimo-pulse >/dev/null 2>&1 || true
          sudo docker rm -f belimo-pulse-postgres >/dev/null 2>&1 || true
          sudo docker rm -f belimo-pulse-backend >/dev/null 2>&1 || true
          sudo docker rm -f belimo-pulse-caddy >/dev/null 2>&1 || true
          sudo docker run -d \
            --name belimo-pulse-postgres \
            --restart unless-stopped \
            --env-file /opt/belimo-pulse/postgres/postgres.env \
            --network belimo-pulse \
            -p 5432:5432 \
            -v /opt/belimo-pulse/postgres/data:/var/lib/postgresql/data \
            --health-cmd='pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=6 \
            postgres:17.9 \
            -c listen_addresses='*' \
            -c password_encryption=scram-sha-256

          postgres_healthy=0
          for attempt in $(seq 1 20); do
            if sudo docker inspect --format '{{.State.Health.Status}}' belimo-pulse-postgres 2>/dev/null | grep -q healthy; then
              postgres_healthy=1
              break
            fi
            sleep 2
          done

          if [ "$postgres_healthy" -ne 1 ]; then
            sudo docker logs belimo-pulse-postgres
            exit 1
          fi

          sudo docker run -d \
            --name belimo-pulse-backend \
            --restart unless-stopped \
            --env-file /opt/belimo-pulse/backend/.env.runtime \
            --network belimo-pulse \
            -p 127.0.0.1:8080:8080 \
            "$IMAGE_REF"

          sudo docker run -d \
            --name belimo-pulse-caddy \
            --restart unless-stopped \
            --network belimo-pulse \
            -p 80:80 \
            -p 443:443 \
            -p 443:443/udp \
            -v /opt/belimo-pulse/caddy/conf:/etc/caddy \
            -v /opt/belimo-pulse/caddy/data:/data \
            -v /opt/belimo-pulse/caddy/config:/config \
            caddy:2

          healthy=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            sudo docker logs belimo-pulse-postgres
            sudo docker logs belimo-pulse-backend
            sudo docker logs belimo-pulse-caddy
            exit 1
          fi

          tls_healthy=0
          for attempt in $(seq 1 40); do
            if curl -fsS "https://${public_host}/health" >/dev/null; then
              tls_healthy=1
              break
            fi
            sleep 2
          done

          if [ "$tls_healthy" -ne 1 ]; then
            sudo docker logs belimo-pulse-caddy
            exit 1
          fi

          running_image_id=$(sudo docker inspect --format '{{.Image}}' belimo-pulse-backend)
          while read -r image_ref image_id; do
            if [ -n "$image_ref" ] && [ "$image_id" != "$running_image_id" ]; then
              sudo docker rmi "$image_ref" >/dev/null 2>&1 || true
            fi
          done < <(sudo docker images "$IMAGE_REPOSITORY" --format '{{.Repository}}:{{.Tag}} {{.ID}}')

          sudo docker image prune -f >/dev/null 2>&1 || true
          EOF

      - name: Smoke test backend
        env:
          AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
        run: |
          set -euo pipefail
          curl -fsS "https://${AWS_EC2_HOST}.sslip.io/health"
